services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: guru_hub_app
    volumes:
      - .:/var/www
    networks:
      - db_network

  web:
    image: nginx:alpine
    container_name: guru_hub_nginx
    ports:
      - "8002:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - db_network

networks:
  db_network:
    external: true